services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    image: bankrupt-to-1-million:latest
    container_name: bankrupt-to-1-million
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      GITHUB_OWNER: ${GITHUB_OWNER:-MyMindVentures}
      GITHUB_REPO: ${GITHUB_REPO:-BankruptTo1Million}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      IMPACT_CACHE_TTL_MS: ${IMPACT_CACHE_TTL_MS:-900000}
    networks:
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}
      - traefik.http.routers.bankrupt-to-1-million.rule=Host(`bankruptto1million.com`) || Host(`www.bankruptto1million.com`)
      - traefik.http.routers.bankrupt-to-1-million.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT:-websecure}
      - traefik.http.routers.bankrupt-to-1-million.tls=true
      - traefik.http.routers.bankrupt-to-1-million.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.bankrupt-to-1-million.loadbalancer.server.port=8080
      - traefik.http.middlewares.bankrupt-www-redirect.redirectregex.regex=^https?://www\.bankruptto1million\.com/(.*)
      - traefik.http.middlewares.bankrupt-www-redirect.redirectregex.replacement=https://bankruptto1million.com/$${1}
      - traefik.http.middlewares.bankrupt-www-redirect.redirectregex.permanent=true
      - traefik.http.routers.bankrupt-to-1-million.middlewares=bankrupt-www-redirect
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  traefik_proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
