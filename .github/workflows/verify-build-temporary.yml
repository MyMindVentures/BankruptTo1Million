name: Verify production build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install, typecheck and build
        id: verify
        shell: bash
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: build-verification-placeholder
        run: |
          set +e
          npm ci 2>&1 | tee npm-ci.log
          CI_STATUS=${PIPESTATUS[0]}
          if [ "$CI_STATUS" -eq 0 ]; then
            npm run typecheck 2>&1 | tee typecheck.log
            TYPECHECK_STATUS=${PIPESTATUS[0]}
          else
            TYPECHECK_STATUS=99
          fi
          if [ "$CI_STATUS" -eq 0 ] && [ "$TYPECHECK_STATUS" -eq 0 ]; then
            npm run build 2>&1 | tee build.log
            BUILD_STATUS=${PIPESTATUS[0]}
          else
            BUILD_STATUS=99
          fi
          printf 'npm_ci=%s\ntypecheck=%s\nbuild=%s\n' "$CI_STATUS" "$TYPECHECK_STATUS" "$BUILD_STATUS" | tee result.log
          printf '%s\n' "$CI_STATUS" > ci-status.txt
          printf '%s\n' "$TYPECHECK_STATUS" > typecheck-status.txt
          printf '%s\n' "$BUILD_STATUS" > build-status.txt
          exit 0
      - name: Publish diagnostic comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '## Automated production-build verification'
            echo
            echo '```text'
            cat result.log 2>/dev/null || true
            echo '```'
            echo
            echo '### npm ci'
            echo '```text'
            tail -n 80 npm-ci.log 2>/dev/null || true
            echo '```'
            echo
            echo '### TypeScript'
            echo '```text'
            tail -n 160 typecheck.log 2>/dev/null || true
            echo '```'
            echo
            echo '### Production build'
            echo '```text'
            tail -n 120 build.log 2>/dev/null || true
            echo '```'
          } > ci-comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file ci-comment.md
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            npm-ci.log
            typecheck.log
            build.log
            result.log
          if-no-files-found: ignore
      - name: Enforce result
        shell: bash
        run: |
          CI_STATUS=$(cat ci-status.txt)
          TYPECHECK_STATUS=$(cat typecheck-status.txt)
          BUILD_STATUS=$(cat build-status.txt)
          if [ "$CI_STATUS" -ne 0 ] || [ "$TYPECHECK_STATUS" -ne 0 ] || [ "$BUILD_STATUS" -ne 0 ]; then exit 1; fi
